name: Build macOS DMG

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing GitHub Release tag to receive the DMG
        required: true
        default: v1.1.9

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop-app/package-lock.json
      - name: Install dependencies
        working-directory: desktop-app
        run: npm ci --include=optional
      - name: Verify sharp in Electron runtime
        working-directory: desktop-app
        run: npm run verify:electron-runtime
      - name: Build unsigned Intel DMG
        working-directory: desktop-app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run dist:mac
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ inputs.release_tag }}" desktop-app/dist/*.dmg --clobber
